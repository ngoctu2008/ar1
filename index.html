<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mô phỏng AR: Khớp lớp sinh mô</title>
    <!-- 1. Thư viện A-Frame lõi -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- 2. Thư viện AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- 3. Thư viện Extras để xử lý Animation cho file .glb -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <!-- Cấu hình Scene: Bật AR webcam, tắt các thông báo debug để giao diện sạch sẽ -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Tải trước tài nguyên -->
      <a-assets>
        <!-- Đặt file .glb của thầy cùng thư mục với file HTML này -->
        <a-asset-item id="mo-hinh-cambium" src="mo_hinh_ghep_nem.glb"></a-asset-item>
      </a-assets>

      <!-- Điểm neo Marker (Sử dụng mẫu Hiro tiêu chuẩn) -->
      <a-marker preset="hiro">
        
        <!-- Gọi mô hình hiển thị trên marker -->
        <!-- Thuộc tính animation-mixer: clip: * sẽ tự động chạy tất cả animation có trong file -->
        <a-entity 
          gltf-model="#mo-hinh-cambium" 
          scale="1 1 1" 
          position="0 0 0" 
          rotation="-90 0 0"
          animation-mixer="clip: *; loop: repeat;">
        </a-entity>
        
      </a-marker>

      <!-- Camera theo dõi vị trí -->
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
